name: PR Maintenance

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed

permissions:
  contents: read
  pull-requests: read

jobs:
  unit-tests:
    name: Unit tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run unit tests
        id: unit-tests
        shell: bash
        run: |
          set -o pipefail
          python -m unittest discover -s test -t . -p 'test_*.py' -v 2>&1 | tee unittest-results.txt

      - name: Publish test summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Unit test result"
            echo
            echo '```text'
            if [ -f unittest-results.txt ]; then
              cat unittest-results.txt
            else
              echo "Unit tests did not produce an output file."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  delete-merged-branch:
    name: Delete merged branch
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref != github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Delete source branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.pull_request.head.ref;

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `heads/${branch}`,
              });
            } catch (error) {
              if (error.status === 404) {
                core.notice(`Branch already deleted: ${branch}`);
                return;
              }
              throw error;
            }

            await core.summary
              .addHeading("Deleted merged branch")
              .addCodeBlock(branch)
              .write();
